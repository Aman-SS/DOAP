<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://d3js.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://ollama.com; connect-src 'self';">
    <title>DOAP - AI Desktop Scraper</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Navigation Drawer (Hidden by default) -->
        <div id="drawer-overlay" class="drawer-overlay hidden"></div>
        <aside class="nav-drawer hidden" id="nav-drawer">
            <div class="drawer-header">
                <h3>Menu</h3>
                <button class="close-drawer" id="close-drawer">&times;</button>
            </div>
            <nav>
                <button class="nav-item active" id="nav-home" title="Home">🏠 <span>Home</span></button>
                <button class="nav-item" id="nav-scrape" title="New Scrape">🔍 <span>Scrape</span></button>
                <button class="nav-item" id="nav-history" title="History">📜 <span>History</span></button>
                <button class="nav-item" id="nav-db-viewer" title="Database">💾 <span>DB</span></button>
                <button class="nav-item" id="nav-feature-map" title="Map">🗺️ <span>Map</span></button>
                <button class="nav-item" id="nav-curiosity" title="Curiosity">🤖 <span>AI</span></button>
                <button class="nav-item" id="nav-settings" title="Settings">⚙️ <span>Settings</span></button>
            </nav>
        </aside>
        
        <main class="content">
            <header>
                <div class="header-left">
                    <div class="header-logo" id="header-logo">DOAP</div>
                    <h2 id="page-title" style="display: none;">Dashboard</h2>
                </div>
                <div class="global-search-container" id="global-search-container">
                    <input type="text" class="global-search-input" id="global-search-input" placeholder="Search or enter URL (e.g. google.com)...">
                </div>
                <div class="header-right">
                    <div class="status-indicator">
                        <span class="dot"></span> <span id="provider-status">Checking...</span>
                    </div>
                    <button class="icon-btn" id="drawer-toggle" title="Menu">☰</button>
                </div>
            </header>

            <div class="page-container" id="app-root"></div>
        </main>
    </div>

    <!-- Content Modal -->
    <div id="content-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Scraped Content</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Content will be injected here -->
            </div>
        </div>
    </div>

    <!-- Global Modal Component (Can be extracted later, keeping here for simplicity for now) -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/force-graph"></script>
    <script type="module" src="index.js"></script>
</body>
</html>
